<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Dashboard</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2 class="logo">TASKS</h2>
    <nav>
      <a class="active">Task List</a>
      <a>Task Page</a>
      <a>New Task</a>
      <a>Task Progress</a>
      <a>Editing of a task</a>
      <a>Adding a comment</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <header class="header">
      <h1>All Tasks</h1>
    </header>

    <section class="task-list">

      <!-- Task Item -->
      <div class="task">
        <input type="checkbox"/>
        <span class="title">Make a Wireframe</span>

        <div class="progress">
          <span class="bar blue" style="width:40%"></span>
        </div>

        <span class="priority high">High</span>
        <span class="status">In Progress</span>
      </div>

      <div class="task active">
        <input type="checkbox"/>
        <span class="title">Video Apps Redesign</span>

        <div class="progress">
          <span class="bar green" style="width:60%"></span>
        </div>

        <span class="priority medium">Medium</span>
        <span class="status">In Progress</span>
      </div>

      <div class="task">
        <input type="checkbox"/>
        <span class="title">Website Design</span>

        <div class="progress">
          <span class="bar blue" style="width:50%"></span>
        </div>

        <span class="priority low">Low</span>
        <span class="status">In Progress</span>
      </div>

      <div class="task">
        <input type="checkbox"/>
        <span class="title">Meeting CEO</span>

        <div class="progress">
          <span class="bar red" style="width:30%"></span>
        </div>

        <span class="priority high">High</span>
        <span class="status">In Progress</span>
      </div>

    </section>
  </main>

</div>

</body>
</html>
