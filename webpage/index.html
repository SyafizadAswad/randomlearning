<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master CRUD</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <h1>Task Manager</h1>

        <div class="controls">
            <input type="text" id="searchBox" placeholder="Search tasks...">
            <select id="sortOptions">
                <option value="none">Sort By...</option>
                <option value="priority">Priority (High to Low)</option>
                <option value="date-asc">Deadline (Closest First)</option>
                <option value="date-desc">Deadline (Furthest First)</option>
            </select>
            <button id="addTaskBtn" class="btn-primary">+ Add Task</button>
        </div>

        <table id="taskTable">
            <thead>
                <tr>
                    <th>Task Name</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Deadline</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="taskBody">
                </tbody>
        </table>
    </div>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modalTitle">Add Task</h2>
            <form id="taskForm">
                <input type="hidden" id="editIndex">
                <div class="form-group">
                    <label>Task Name</label>
                    <input type="text" id="taskName" required>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="priority">
                        <option value="1">Low</option>
                        <option value="2">Medium</option>
                        <option value="3">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Deadline</label>
                    <input type="date" id="deadline" required>
                </div>
                <button type="submit" class="btn-primary">Save Task</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
